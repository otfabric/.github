name: Go Release Reusable

on:
  workflow_call:
    inputs:
      bump:
        required: true
        type: string
      release-name-prefix:
        required: false
        type: string
        default: ""
      test-exclude-regex:
        required: false
        type: string
        default: "(/examples($|/)|/cmd($|/))"
      timeout-minutes:
        required: false
        type: number
        default: 20
      run-vet:
        required: false
        type: boolean
        default: true
      update-major-tag:
        required: false
        type: boolean
        default: false
    secrets:
      OTFABRIC_READ_TOKEN:
        required: true

permissions:
  contents: write

env:
  GOPRIVATE: github.com/otfabric/*

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify default branch
        shell: bash
        run: |
          set -euo pipefail
          default="${{ github.event.repository.default_branch }}"
          current="${{ github.ref_name }}"
          if [ "$current" != "$default" ]; then
            echo "::error::Releases are only allowed from the default branch. Current ref: $current, default branch: $default"
            exit 1
          fi
          echo "Running on default branch: $default"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Auth for private otfabric modules
        shell: bash
        run: |
          git config --global url."https://x-access-token:${{ secrets.OTFABRIC_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Verify module files
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: go vet
        if: inputs.run-vet
        run: go vet ./...

      - name: Resolve test packages
        id: pkgs
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t pkgs < <(go list ./... | grep -Ev '${{ inputs.test-exclude-regex }}' || true)
          if [ "${#pkgs[@]}" -eq 0 ]; then
            echo "::error::No test packages found after filtering"
            exit 1
          fi
          printf 'list=%s\n' "${pkgs[*]}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: go test -count=1 -timeout=120s ${{ steps.pkgs.outputs.list }}

      - name: Race test
        run: go test -count=1 -timeout=120s -race ${{ steps.pkgs.outputs.list }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          bump="${{ inputs.bump }}"

          case "$bump" in
            patch|minor|major) ;;
            *)
              echo "::error::Invalid bump: $bump"
              exit 1
              ;;
          esac

          previous_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)"
          if [ -z "$previous_tag" ]; then
            previous_tag="v0.0.0"
          fi

          previous_version="${previous_tag#v}"
          IFS='.' read -r major minor patch <<< "$previous_version"

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          version="${major}.${minor}.${patch}"
          tag="v${version}"
          major_tag="v${major}"

          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "major_tag=$major_tag" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::error::Tag $tag already exists. Tags are immutable; choose a different bump."
            exit 1
          fi

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          prev="${{ steps.version.outputs.previous_tag }}"
          tag="${{ steps.version.outputs.tag }}"
          out="$RUNNER_TEMP/release-notes.md"
          used_release_md="false"

          if [ -f RELEASE.md ]; then
            awk -v target="## ${tag}" '
              $0 == target { found=1; next }
              found && /^---$/ { exit }
              found { print }
            ' RELEASE.md > "$out"

            if [ -s "$out" ]; then
              used_release_md="true"
            else
              {
                echo "## Changes since ${prev}"
                echo
                if [ "$prev" = "v0.0.0" ]; then
                  git log --pretty=format:"- %s (%h)"
                else
                  git log "${prev}..HEAD" --pretty=format:"- %s (%h)"
                fi
              } > "$out"
            fi
          else
            {
              echo "## Changes since ${prev}"
              echo
              if [ "$prev" = "v0.0.0" ]; then
                git log --pretty=format:"- %s (%h)"
              else
                git log "${prev}..HEAD" --pretty=format:"- %s (%h)"
              fi
            } > "$out"
          fi

          echo "file=$out" >> "$GITHUB_OUTPUT"
          echo "used_release_md=$used_release_md" >> "$GITHUB_OUTPUT"

      - name: Create and push annotated tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag" "${{ github.sha }}"
          git push origin "refs/tags/$tag"

      - name: Update moving major tag
        if: inputs.update-major-tag
        shell: bash
        run: |
          set -euo pipefail
          major_tag="${{ steps.version.outputs.major_tag }}"
          tag="${{ steps.version.outputs.tag }}"
          git tag -fa "$major_tag" -m "Update $major_tag to $tag" "${{ github.sha }}"
          git push origin "refs/tags/$major_tag" --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"

          if [ -n "${{ inputs.release-name-prefix }}" ]; then
            title="${{ inputs.release-name-prefix }} ${tag}"
          else
            title="${tag}"
          fi

          gh release create "$tag" \
            --title "$title" \
            --notes-file "${{ steps.notes.outputs.file }}" \
            --target "${{ github.sha }}"

      - name: Release summary
        shell: bash
        run: |
          {
            echo "## Release summary"
            echo
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Repository | ${{ github.repository }} |"
            echo "| Bump | ${{ inputs.bump }} |"
            echo "| Previous tag | ${{ steps.version.outputs.previous_tag }} |"
            echo "| New tag | ${{ steps.version.outputs.tag }} |"
            echo "| Major tag updated | ${{ inputs.update-major-tag }} |"
            echo "| Notes from RELEASE.md | ${{ steps.notes.outputs.used_release_md }} |"
            echo "| Tests | Passed before release |"
          } >> "$GITHUB_STEP_SUMMARY"
